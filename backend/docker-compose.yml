# Backend stack: Postgres + Dragonfly + backend, colocated with backend/.env.
# Because this compose file sits next to backend/.env, Compose auto-loads that
# ONE file for both channels: ${...} interpolation (postgres creds, host port)
# AND the backend container's env (env_file: .env). So every value lives once.
#
# Public self-host: run the whole file. Owner/external-infra: prune the postgres
# and/or dragonfly service in a skip-worktree copy and point DB_HOST/REDIS_HOST
# in backend/.env at the managed endpoints.
#
# `name` fixes the project (and thus the network `aala-land_default`) so the
# frontend compose can join it by name.
name: aala-land

services:
  postgres:
    image: postgres:18-alpine
    container_name: aala-land-postgres
    ports:
      - "5480:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: aala-land-dragonfly
    ports:
      - "6470:6379"
    volumes:
      - dragonfly_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aala-land-backend
    ports:
      - "${BACKEND_HOST_PORT:-3010}:3010"
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  dragonfly_data:
