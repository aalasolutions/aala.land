# Own per-stack project, separate from the backend project (no cross orphans).
name: ${STACK_NAME:-aala-land}-frontend

services:
  aala-land-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    image: ${STACK_NAME:-aala-land}-frontend
    container_name: ${STACK_NAME:-aala-land}-frontend
    restart: always
    ports:
      - "${FRONTEND_HOST_PORT:-7102}:8080"

# Backend stack's network; must match STACK_NAME (deploy scripts export it).
networks:
  default:
    name: ${STACK_NAME:-aala-land}_default
    external: true
