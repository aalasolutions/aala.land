map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    image/svg+xml
    text/css
    text/plain
    text/xml;

  location ^~ /v1 {
    client_max_body_size 50m;

    proxy_pass http://backend:3010;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    proxy_pass http://backend:3010;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    # A block with any add_header ignores inherited ones, so nosniff is repeated
    # here to keep it on hashed JS/CSS responses.
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
  }

  location / {
    try_files $uri $uri/ /index.html;

    # Browser security headers for the app shell. Scoped to the static SPA (not
    # the /v1 or /socket.io proxy blocks, which carry the backend's own helmet
    # headers). Fixes the clickjacking/MIME/referrer gaps found in the pentest.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;

    # CSP starts in Report-Only so a wrong directive cannot break the live SPA or
    # the Google Identity login flow. Watch the browser console for violations,
    # tighten as needed, then rename this header to Content-Security-Policy to
    # enforce. connect-src covers both same-origin /v1 and the api.aala.land host
    # plus its websocket; script/frame allow Google Identity Services.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.aala.land wss://api.aala.land https://accounts.google.com; frame-src 'self' https://accounts.google.com; form-action 'self'; upgrade-insecure-requests" always;
  }
}
